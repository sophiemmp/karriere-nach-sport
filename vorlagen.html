<!doctype html>
<html lang="de-CH">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multimediabeitrag – Vorlage</title>

    <meta name="description" content="Standardisierte Vorlage für einen Multimediabeitrag (Fokus: Inhalt)." />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container">
        <div class="brand">Multimediabeitrag</div>
      </div>
    </header>

    <main class="page">
      <article class="container">
        <!-- Audio-Teaser (zuoberst, vor der Oberzeile, OPTIONAL) -->
        <!-- Audio-Beitrag -->
        <div class="audio-card content-block">
          <h3 class="audio-label">Audio-Beitrag</h3>
          <audio class="audio" controls preload="metadata">
            <source src="pfad/zum/audio.mp3" type="audio/mpeg" />
            Dein Browser unterstützt das Audio-Element nicht.
          </audio>
        </div>
        <!-- Ende - Audio-Beitrag -->
        <!-- Ende - Audio-Teaser -->

        <!-- !!! FIX !!! Reihenfolge der Inhalte im content-header bis inkl. erstem Textblock ist vorgegeben !!! FIX !!! -->
        <!-- Content-Header -->
        <header class="content-header">
          <!-- Oberzeile -->
          <p class="preheadline">Oberzeile</p>
          <!-- Ende - Oberzeile -->

          <!-- Titel -->
          <h1 class="headline" id="headline-title">Titel</h1>
          <!-- Ende - Titel -->

          <!-- Lead -->
          <p class="lead"></p>
          <!-- Ende - Lead -->

          <!-- Autor:innenzeile-->
          <p class="author-line content-block">
            Ein Beitrag von <span class="author-name">Anna Muster</span> und <span class="author-name">Noé Beispiel</span>,
            <time datetime="2026-02-13">13.02.2026</time>
          </p>
          <!-- Ende - Autor:innenzeile-->

          <p class="content-block"></p>
        </header>
        <!-- Ende - Content-Header -->

        <!-- BLOCK: Zwischentitel + Textblock -->
        <section class="content-block text-block">
          <h2 class="subheadline">Zwischentitel</h2>
          <p>Textblock</p>
        </section>
        <!-- Ende - BLOCK: Zwischentitel + Textblock -->

        <!-- BLOCK: Einzelbild + Bildlegende -->
        <figure class="content-block">
          <img class="figure-image" src="pfad/zum/bild.jpg" alt="Beschreibung des Bildes" loading="lazy" />
          <figcaption class="figure-caption"><strong>Beschriftung des Bildes.</strong> Foto: Beat Mustermann</figcaption>
        </figure>
        <!-- Ende - BLOCK: Einzelbild + Bildlegende -->

        <!-- BLOCK: Zusammenfassung oder Transkription für Menschen mit Hörbeeinträchtigung -->
        <details class="text-toggle">
          <summary>Mehr lesen</summary>
          <p>Zusammenfassung oder Transkription, Absatz 1</p>
          <p>Zusammenfassung oder Transkription, Absatz 2</p>
        </details>
        <!--Ende - BLOCK: Zusammenfassung oder Transkription für Menschen mit Hörbeeinträchtigung -->

        <!-- Footer ist OPTIONAL -->
        <footer class="article-footer">
          <p class="small"><span class="copyleft">©</span> 2026 – ???</p>
        </footer>
      </article>
    </main>
  </body>
</html>
